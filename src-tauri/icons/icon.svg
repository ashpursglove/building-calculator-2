<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1210"/>
      <stop offset="100%" stop-color="#111816"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <g fill="none" stroke="#2dd4bf" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="200" y="420" width="280" height="280" rx="48" ry="48" fill="#2dd4bf" fill-opacity="0.12"/>
    <rect x="544" y="300" width="280" height="400" rx="48" ry="48" fill="#2dd4bf" fill-opacity="0.12"/>
    <rect x="176" y="668" width="672" height="120" rx="28" ry="28" fill="#2dd4bf" fill-opacity="0.08"/>
  </g>
</svg>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDT Construction Planner</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0c1210;
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 32px 24px;
        box-sizing: border-box;
        background:
          radial-gradient(
            1200px 700px at 50% 18%,
            rgba(45, 212, 191, 0.09),
            transparent 60%
          ),
          linear-gradient(180deg, #0c1210 0%, #111816 100%);
        color: #e2e8f0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        transition: opacity 280ms ease 60ms;
      }

      #splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo-wrap {
        width: 112px;
        height: 112px;
        border-radius: 26px;
        background: linear-gradient(180deg, #0c1210 0%, #111816 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 12px 40px rgba(45, 212, 191, 0.12),
          0 0 0 1px rgba(45, 212, 191, 0.2) inset;
      }

      .splash-logo {
        width: 72px;
        height: 72px;
        stroke: #2dd4bf;
        stroke-width: 2.4;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 12px rgba(45, 212, 191, 0.35));
        animation: splash-pulse 2.2s ease-in-out infinite;
      }

      @keyframes splash-pulse {
        0%,
        100% {
          opacity: 0.78;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1.02);
        }
      }

      .splash-title-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .splash-title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.012em;
        color: #f1f5f9;
      }

      .splash-version {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #2dd4bf;
        background: rgba(45, 212, 191, 0.1);
        padding: 2px 7px;
        border-radius: 999px;
        border: 1px solid rgba(45, 212, 191, 0.28);
      }

      .splash-subtitle {
        font-size: 11px;
        color: #94a3b8;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: -2px;
      }

      .splash-log {
        width: min(520px, 100%);
        margin-top: 16px;
        padding: 12px 14px;
        font-family:
          ui-monospace,
          SFMono-Regular,
          "Cascadia Code",
          Menlo,
          "Liberation Mono",
          Consolas,
          monospace;
        font-size: 11.5px;
        line-height: 1.6;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 12px;
        backdrop-filter: blur(6px);
        max-height: 180px;
        overflow-y: auto;
        scroll-behavior: smooth;
        color: #cbd5e1;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
      }

      .splash-log::-webkit-scrollbar {
        width: 4px;
      }

      .splash-log::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.25);
        border-radius: 2px;
      }

      .splash-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        opacity: 0;
        transform: translateY(2px);
        animation: splash-row-in 240ms ease forwards;
      }

      @keyframes splash-row-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .splash-pip {
        flex-shrink: 0;
        margin-top: 5px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #475569;
        box-shadow: 0 0 0 2px rgba(71, 85, 105, 0.18);
      }

      .splash-row[data-status="running"] .splash-pip {
        background: #facc15;
        box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.2);
        animation: splash-blink 1s ease-in-out infinite;
      }

      .splash-row[data-status="done"] .splash-pip {
        background: #34d399;
        box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2);
      }

      .splash-row[data-status="skipped"] .splash-pip {
        background: #64748b;
      }

      .splash-row[data-status="warning"] .splash-pip {
        background: #fb923c;
        box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.18);
      }

      .splash-row[data-status="info"] .splash-pip {
        background: #2dd4bf;
        box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.2);
      }

      @keyframes splash-blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.45;
        }
      }

      .splash-row-text {
        min-width: 0;
        flex: 1;
      }

      .splash-msg {
        color: #e2e8f0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .splash-detail {
        color: #64748b;
        font-size: 10.5px;
        margin-top: 1px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .splash-hint {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10.5px;
        color: #475569;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-zinc-100 antialiased">
    <div id="splash" role="status" aria-label="Loading GDT Construction Planner">
      <div class="splash-logo-wrap">
        <svg
          class="splash-logo"
          viewBox="0 0 64 64"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <rect x="10" y="28" width="18" height="22" rx="3" ry="3" />
          <rect x="34" y="18" width="20" height="32" rx="3" ry="3" />
          <rect x="8" y="46" width="48" height="10" rx="2" ry="2" opacity="0.55" />
        </svg>
      </div>
      <div class="splash-title-row">
        <span class="splash-title">GDT Construction Planner</span>
        <span class="splash-version" id="splash-version">v0.1</span>
      </div>
      <div class="splash-subtitle">Starting up</div>

      <div class="splash-log" id="splash-log" role="log" aria-live="polite"></div>

      <div class="splash-hint">Desktop construction estimates · GCTP JSON projects</div>
    </div>

    <script>
      (function () {
        var logEl = document.getElementById("splash-log");
        var rowsByKey = Object.create(null);

        function appendLine(key, message, status, detail) {
          var row;
          if (key && rowsByKey[key]) {
            row = rowsByKey[key];
            row.setAttribute("data-status", status || "info");
            var msgEl = row.querySelector(".splash-msg");
            if (msgEl) msgEl.textContent = message;
            var detailEl = row.querySelector(".splash-detail");
            if (detail) {
              if (detailEl) {
                detailEl.textContent = detail;
              } else {
                detailEl = document.createElement("div");
                detailEl.className = "splash-detail";
                detailEl.textContent = detail;
                row.querySelector(".splash-row-text").appendChild(detailEl);
              }
            } else if (detailEl) {
              detailEl.remove();
            }
          } else {
            row = document.createElement("div");
            row.className = "splash-row";
            row.setAttribute("data-status", status || "info");
            row.innerHTML =
              '<span class="splash-pip"></span>' +
              '<div class="splash-row-text">' +
              '  <div class="splash-msg"></div>' +
              "</div>";
            row.querySelector(".splash-msg").textContent = message;
            if (detail) {
              var detailEl2 = document.createElement("div");
              detailEl2.className = "splash-detail";
              detailEl2.textContent = detail;
              row.querySelector(".splash-row-text").appendChild(detailEl2);
            }
            if (logEl) logEl.appendChild(row);
            if (key) rowsByKey[key] = row;
          }
          if (logEl) logEl.scrollTop = logEl.scrollHeight;
          return row;
        }

        window.__splash = {
          log: function (message, opts) {
            opts = opts || {};
            return appendLine(opts.key, message, opts.status || "running", opts.detail);
          },
          done: function (key, message, detail) {
            return appendLine(key, message, "done", detail);
          },
          info: function (message, detail) {
            return appendLine(null, message, "info", detail);
          },
          warning: function (message, detail) {
            return appendLine(null, message, "warning", detail);
          },
          skipped: function (key, message, detail) {
            return appendLine(key, message, "skipped", detail);
          },
          setVersion: function (version) {
            var el = document.getElementById("splash-version");
            if (el && version) el.textContent = "v" + version;
          },
          dismiss: function () {
            var splash = document.getElementById("splash");
            if (!splash) return;
            splash.classList.add("is-hidden");
            setTimeout(function () {
              if (splash && splash.parentNode)
                splash.parentNode.removeChild(splash);
            }, 320);
          },
        };

        window.__splash.log("Initialising WebView2 surface…", {
          key: "boot",
          status: "running",
        });
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
